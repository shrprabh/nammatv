name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily channel-list refresh — 00:30 UTC ≈ 6:00 AM IST
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write # keepalive via API

concurrency:
  group: pages
  cancel-in-progress: false # queue deploys; never kill one mid-flight

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh channel data from iptv-org
        run: |
          node scripts/build-data.mjs \
            || echo "::warning::iptv-org fetch failed — deploying with the committed data snapshot"

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # GitHub disables scheduled workflows after 60 days without commits;
      # re-enabling this workflow via the API resets that timer.
      - name: Keepalive
        if: github.event_name == 'schedule'
        run: gh api -X PUT "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/enable"
        env:
          GH_TOKEN: ${{ github.token }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
